<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mãos que Transformam | ONG</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; color: #333; line-height: 1.6; background-color: #f4f7f6; scroll-behavior: smooth; }
        
        /* Header e Ajuste da Logo para Branco */
        header { background: #2c3e50; color: white; padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logo h2 { color: #ffffff; margin: 0; } /* Ajuste de cor solicitado */
        
        nav a { color: white; margin-left: 20px; text-decoration: none; font-weight: bold; transition: 0.3s; }
        nav a:hover { color: #e67e22; }

        .hero { background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1509062522246-3755977927d7?auto=format&fit=crop&w=1350&q=80'); background-size: cover; background-position: center; height: 400px; display: flex; align-items: center; justify-content: center; color: white; text-align: center; }
        .hero h1 { font-size: 2.8rem; margin-bottom: 10px; }
        
        section { padding: 60px 10%; }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 40px; position: relative; }
        h2::after { content: ''; width: 60px; height: 3px; background: #e67e22; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%); }
        
        /* Grid de Projetos */
        .classes-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .card { border-radius: 12px; background: white; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.08); transition: 0.3s; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-10px); }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-content { padding: 20px; flex-grow: 1; }
        .card h3 { color: #e67e22; margin: 0 0 10px 0; }

        /* Container Flex para Doação e Contato */
        .flex-container { display: flex; gap: 30px; align-items: stretch; }
        .flex-item { flex: 1; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .bg-green { background-color: #27ae60; color: white; }
        .bg-green h2 { color: white; }
        .bg-green h2::after { background: white; }
